<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日志查看</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="header">
      <h1>日志查看</h1>
      <p class="hint">
        数据来自本机 <code>logs/</code>（或环境变量 <code>LOG_DIR</code>）。可选 <code>LOG_ENCODING</code>（如
        <code>gbk</code>）。
      </p>
    </header>
    <main class="layout">
      <aside class="sidebar">
        <h2>文件</h2>
        <ul id="file-list" class="file-list"></ul>
        <p id="list-error" class="error" hidden></p>
      </aside>
      <section class="content">
        <div class="toolbar">
          <label class="toolbar-block">
            <span>末尾行数（tail）</span>
            <input type="number" id="tail-lines" value="500" min="1" max="50000" />
          </label>
          <span class="toolbar-sep">或分页</span>
          <label class="toolbar-block">
            <span>offset</span>
            <input type="number" id="page-offset" value="" min="0" placeholder="留空则 tail" />
          </label>
          <label class="toolbar-block">
            <span>limit</span>
            <input type="number" id="page-limit" value="" min="1" max="50000" placeholder="留空则 tail" />
          </label>
          <button type="button" id="btn-refresh">刷新</button>
        </div>
        <pre id="log-body" class="log-body"></pre>
        <p id="log-meta" class="meta" hidden></p>
        <p id="log-error" class="error" hidden></p>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
